spring:
  application:
    name: wealth-tracker-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/wealth_tracker}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:8081}

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY:Q29kZXhQb3J0Zm9saW9UcmFja2VyU3VwZXJTZWNyZXRLZXlGb3JERXY=}
      expiration: ${JWT_EXPIRATION_MS:86400000}
